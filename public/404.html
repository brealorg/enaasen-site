<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 – Enåsen</title>
  <meta name="theme-color" content="#050506">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 22px;
      color: #f5f5f5;
      font-family: Inter, system-ui, sans-serif;
      background:
        radial-gradient(circle at 50% -10%, rgba(225, 25, 25, 0.20), transparent 34%),
        linear-gradient(180deg, #101014 0%, #050506 62%);
    }

    main {
      width: min(100%, 620px);
      padding: 42px;
      border-radius: 28px;
      text-align: center;
      background: rgba(13, 13, 16, 0.84);
      border: 1px solid rgba(255,255,255,0.10);
      box-shadow: 0 30px 90px rgba(0,0,0,0.58);
    }

    h1 {
      margin: 0;
      font-size: clamp(4rem, 14vw, 7rem);
      line-height: 0.9;
      letter-spacing: -0.08em;
      font-weight: 900;
    }

    .line {
      width: 70px;
      height: 4px;
      margin: 26px auto 22px;
      border-radius: 99px;
      background: linear-gradient(90deg, transparent, #e11919, transparent);
    }

    p {
      margin: 0;
      color: #9ca3af;
      line-height: 1.7;
      font-size: 1rem;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 28px;
      min-height: 44px;
      padding: 0 18px;
      border-radius: 999px;
      text-decoration: none;
      color: white;
      font-weight: 750;
      background: rgba(225, 25, 25, 0.18);
      border: 1px solid rgba(225, 25, 25, 0.36);
    }
  </style>
</head>

<body>
  <main>
    <h1>404</h1>
    <div class="line"></div>
    <p>Siden finnes ikke.</p>
    <a href="/">Til forsiden</a>
  </main>
</body>
</html>
