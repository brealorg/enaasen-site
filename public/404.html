<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 – Enåsen</title>
  <meta name="theme-color" content="#0b0b0f">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      font-family: Inter, system-ui, sans-serif;
      background:
        radial-gradient(circle at top, rgba(209, 23, 23, 0.14), transparent 30%),
        linear-gradient(180deg, #11131a 0%, #08090c 100%);
      color: #f5f7fb;
    }

    main {
      width: min(92vw, 640px);
      padding: 2.4rem;
      border-radius: 24px;
      text-align: center;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.10);
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }

    h1 {
      margin: 0 0 1rem;
      font-size: clamp(2.5rem, 8vw, 4.5rem);
      line-height: 1;
      letter-spacing: -0.05em;
    }

    p {
      margin: 0.75rem 0;
      color: #b0b5c2;
      line-height: 1.7;
    }

    a {
      display: inline-block;
      margin-top: 1.2rem;
      padding: 0.85rem 1.1rem;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      color: white;
      background: linear-gradient(135deg, #d11717, #ff4d4d);
    }
  </style>
</head>
<body>
  <main>
    <h1>404</h1>
    <p>Siden finnes ikke.</p>
    <p>Men domenet lever fortsatt, dessverre.</p>
    <a href="/">Til forsiden</a>
  </main>
</body>
</html>
