<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Enåsen</title>
  <meta name="description" content="Laget med Cloudflare og GitHub.">
  <meta name="theme-color" content="#050506">

  <style>
    :root {
      --bg: #050506;
      --panel: rgba(13, 13, 16, 0.82);
      --line: rgba(255, 255, 255, 0.10);
      --text: #f5f5f5;
      --muted: #9ca3af;
      --red: #e11919;
      --red-soft: rgba(225, 25, 25, 0.20);
      --shadow: 0 30px 100px rgba(0, 0, 0, 0.65);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 22px;
      overflow-x: hidden;
      color: var(--text);
      font-family:
        Inter,
        ui-sans-serif,
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
      background:
        radial-gradient(circle at 50% -10%, rgba(225, 25, 25, 0.22), transparent 34%),
        radial-gradient(circle at 85% 110%, rgba(255, 255, 255, 0.06), transparent 30%),
        linear-gradient(180deg, #101014 0%, var(--bg) 58%);
    }

    .noise {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.035;
      background-image:
        linear-gradient(rgba(255,255,255,.6) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.6) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: radial-gradient(circle at center, black, transparent 72%);
    }

    .wrap {
      position: relative;
      width: min(100%, 980px);
    }

    .wrap::before {
      content: "";
      position: absolute;
      inset: -1px;
      border-radius: 34px;
      padding: 1px;
      background:
        linear-gradient(135deg, rgba(225,25,25,.85), rgba(255,255,255,.08), rgba(225,25,25,.15));
      -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
      opacity: 0.9;
    }

    .card {
      display: grid;
      grid-template-columns: 0.95fr 1.05fr;
      min-height: 520px;
      overflow: hidden;
      border-radius: 34px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.055), rgba(255,255,255,.025)),
        var(--panel);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .brand {
      position: relative;
      display: grid;
      place-items: center;
      padding: 42px;
      border-right: 1px solid var(--line);
      background:
        radial-gradient(circle at 50% 45%, var(--red-soft), transparent 34%),
        linear-gradient(145deg, rgba(255,255,255,.03), rgba(255,255,255,0));
    }

    .brand::after {
      content: "";
      position: absolute;
      left: 10%;
      right: 10%;
      bottom: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--red), transparent);
      opacity: 0.75;
    }

    .logo {
      width: min(100%, 360px);
      filter:
        drop-shadow(0 28px 38px rgba(0,0,0,.75))
        drop-shadow(0 0 22px rgba(225,25,25,.12));
      transform: rotate(-2deg);
    }

    .content {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 56px;
    }

    .kicker {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      width: fit-content;
      margin-bottom: 22px;
      color: var(--muted);
      font-size: 0.78rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .kicker::before {
      content: "";
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: var(--red);
      box-shadow: 0 0 22px rgba(225, 25, 25, 0.9);
    }

    h1 {
      margin: 0;
      font-size: clamp(3.2rem, 7.5vw, 6.2rem);
      line-height: 0.86;
      letter-spacing: -0.085em;
      font-weight: 900;
    }

    .line {
      width: 76px;
      height: 4px;
      margin: 28px 0 24px;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--red), transparent);
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: clamp(1rem, 2vw, 1.15rem);
      line-height: 1.7;
    }

    .stack {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 32px;
    }

.pill {
  position: relative;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 40px;
  padding: 0 14px;
  border-radius: 999px;
  color: #e5e7eb;
  background: rgba(255, 255, 255, 0.055);
  border: 1px solid rgba(255, 255, 255, 0.10);
  font-size: 0.88rem;
  font-weight: 650;
  text-decoration: none;
  overflow: hidden;
  isolation: isolate;
  transition:
    transform 160ms ease,
    border-color 160ms ease,
    background 160ms ease,
    box-shadow 160ms ease;
}

.pill::before {
  content: "";
  position: absolute;
  inset: 0;
  z-index: -1;
  opacity: 0;
  background:
    radial-gradient(circle at center, rgba(255,255,255,0.16), transparent 58%);
  transition: opacity 160ms ease;
}

.pill:hover {
  transform: translateY(-2px);
  border-color: rgba(255, 255, 255, 0.22);
  background: rgba(255, 255, 255, 0.085);
  box-shadow: 0 12px 28px rgba(0,0,0,0.28);
}

.pill:hover::before {
  opacity: 1;
}

.pill:active {
  transform: translateY(0) scale(0.97);
  box-shadow: 0 6px 14px rgba(0,0,0,0.22);
}

.pill:focus-visible {
  outline: 2px solid rgba(255, 255, 255, 0.75);
  outline-offset: 4px;
}

.pill.red {
  background: rgba(225, 25, 25, 0.13);
  border-color: rgba(225, 25, 25, 0.34);
  color: #ffffff;
}

.pill.red:hover {
  background: rgba(225, 25, 25, 0.22);
  border-color: rgba(225, 25, 25, 0.58);
  box-shadow:
    0 12px 30px rgba(0,0,0,0.32),
    0 0 28px rgba(225,25,25,0.18);
}

    .foot {
      margin-top: 34px;
      color: #6b7280;
      font-size: 0.84rem;
    }

    @media (max-width: 820px) {
      body {
        padding: 14px;
      }

      .card {
        grid-template-columns: 1fr;
        min-height: auto;
        border-radius: 28px;
      }

      .wrap::before {
        border-radius: 28px;
      }

      .brand {
        min-height: 270px;
        padding: 28px 24px 12px;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .brand::after {
        left: 18%;
        right: 18%;
      }

      .logo {
        width: min(78vw, 260px);
      }

      .content {
        padding: 30px 24px 32px;
      }

      .line {
        margin: 22px 0 20px;
      }

      .stack {
        margin-top: 26px;
      }
    }

    @media (max-width: 440px) {
      .brand {
        min-height: 230px;
      }

      .logo {
        width: min(82vw, 230px);
      }

      .content {
        padding: 26px 20px 28px;
      }

      .pill {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>

<body>
  <div class="noise" aria-hidden="true"></div>

  <main class="wrap">
    <section class="card" aria-label="Enåsen placeholder">
      <div class="brand">
        <img class="logo" src="/logo.png" alt="Enåsen logo">
      </div>

      <div class="content">
        <div class="kicker">Privat domene</div>

        <h1>Enåsen</h1>

        <div class="line"></div>

        <p>
          Laget med Cloudflare og GitHub.
        </p>

<div class="stack" aria-label="Teknologi">
  <a class="pill red" href="https://www.cloudflare.com" target="_blank" rel="noopener noreferrer">
    Cloudflare
  </a>

  <a class="pill" href="https://github.com/brealorg/enaasen-site" target="_blank" rel="noopener noreferrer">
    GitHub
  </a>

  <span class="pill">Static deploy</span>
</div>
        <div class="foot">
          enaasen.no · enåsen.no
        </div>
      </div>
    </section>
  </main>
</body>
</html>
