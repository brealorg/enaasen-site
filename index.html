<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Enåsen</title>
  <meta name="description" content="Privat domene.">
  <style>
    :root {
      color-scheme: light dark;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f1ec;
      color: #1f1f1f;
    }

    main {
      width: min(90vw, 640px);
      padding: 3rem;
      background: rgba(255, 255, 255, 0.86);
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: 24px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.10);
      text-align: center;
    }

    h1 {
      margin: 0 0 0.75rem;
      font-size: clamp(2.5rem, 8vw, 5rem);
      letter-spacing: -0.06em;
      font-weight: 750;
    }

    p {
      margin: 0.5rem 0;
      line-height: 1.6;
      font-size: 1.05rem;
    }

    .muted {
      color: #666;
      font-size: 0.95rem;
    }

    a {
      color: inherit;
      text-underline-offset: 0.2em;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background: #151515;
        color: #f2f2f2;
      }

      main {
        background: rgba(30, 30, 30, 0.88);
        border-color: rgba(255, 255, 255, 0.12);
      }

      .muted {
        color: #aaa;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Enåsen</h1>
    <p>Privat domene.</p>
    <p class="muted">Nettsiden er foreløpig kun en enkel placeholder.</p>
  </main>
</body>
</html>
